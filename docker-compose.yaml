services:
  api:
    build:
      context: .
      dockerfile: ./services/api/Dockerfile
    user: "1000:1000"
    # ports:
    #   - 8000:8000
    volumes:
      - ./volumes/game_data:/game_data

  nginx:
    build:
      context: .
      dockerfile: ./services/nginx/Dockerfile
    ports: 
      - 8080:8080
    volumes: 
      - ./volumes/game:/usr/share/nginx/html
    depends_on:
      - api


volumes:
  game_data:
  game:
